services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: flowpay-frontend:latest
    container_name: flowpay-frontend
    ports:
      - "4200:4200"
    volumes:
      # Monta o código-fonte para hot-reload funcionar
      - .:/app
      # Preserva o node_modules do container (não sobrescreve com o do host)
      - /app/node_modules
      - /app/.angular
    environment:
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - flowpay-net

networks:
  flowpay-net:
    driver: bridge
