<div class="dashboard-root">
  <app-header
    [geradoEm]="dashboard()?.geradoEm ?? null"
    [online]="online()">
  </app-header>

  @if (dashboard(); as data) {
    <app-resumo-cards [resumo]="data.resumo"></app-resumo-cards>

    <section class="times-section">
      <h2 class="section-title">🏢 Times</h2>
      <div class="times-grid">
        @for (time of data.times; track time.time) {
          <app-time-card [time]="time"></app-time-card>
        }
      </div>
    </section>

    <app-fila-panel [fila]="data.fila"></app-fila-panel>
  } @else {
    <div class="loading">
      @if (erro()) {
        <span class="erro-msg">⚠️ Erro ao carregar: {{ erro() }}</span>
      } @else {
        <div class="spinner"></div>
        <span>Carregando dados...</span>
      }
    </div>
  }
</div>
